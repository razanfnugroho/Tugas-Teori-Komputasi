<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Pet: Elaina & Ramuan Keabadian</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --panel-bg: #16213e;
            --text-color: #e94560;
            --text-light: #fff;
            --btn-bg: #0f3460;
            --btn-hover: #e94560;
            --border-color: #8b4513; 
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--panel-bg);
            padding: 20px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 100%;
            text-align: center;
            border: 2px solid var(--border-color);
            position: relative;
        }

        h1 {
            color: var(--text-color);
            margin-bottom: 5px;
        }

        .status-badge {
            display: inline-block;
            background-color: var(--text-color);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        .progress-container {
            width: 100%;
            background-color: #0f172a;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            height: 20px;
        }

        .progress-bar {
            height: 100%;
            width: 0%; 
            border-radius: 10px;
            transition: width 0.5s ease-in-out, background-color 0.5s ease;
        }

        /* --- Image Container & GIF Loading --- */
        .image-container {
            position: relative;
            width: 100%;
            height: 300px;
            background-color: #000;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 2px solid var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-container img#stateImage {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: filter 0.4s ease;
        }

        .img-blur {
            filter: blur(8px) grayscale(0.4);
        }

        /* Overlay Loading Elegan (Background Gelap Transparan) */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(22, 33, 62, 0.8); 
            display: none; /* Muncul lewat JS */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            
        }

        .loading-gif {
            max-width: 250px;
            /* Tidak butuh mix-blend-mode karena GIF sudah transparan */
        }

        .loading-text {
            color: var(--text-color);
            margin-top: 15px;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }

        /* --- UI Lainnya --- */
        .story-box {
            background-color: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            min-height: 60px;
            font-style: italic;
            transition: color 0.3s ease;
        }

        .actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        button {
            background-color: var(--btn-bg);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        button:hover:not(:disabled) {
            background-color: var(--btn-hover);
            transform: scale(1.05);
        }

        button:disabled {
            background-color: #444;
            color: #888;
            cursor: not-allowed;
        }

        .btn-reset {
            background-color: #4a148c; 
        }
        
        .btn-reset:hover {
            background-color: #310866 !important; 
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Elaina's Alchemy</h1>
        <div class="status-badge" id="stateLabel">State: Kosong</div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="image-container">
            <img id="stateImage" src="kosong.png" alt="Gambar State">
            
            <div id="loadingOverlay" class="loading-overlay">
                <img src="LoadingScreen_Elaina.gif" class="loading-gif" alt="Loading Elaina">
                <div class="loading-text">Proses...</div>
            </div>
        </div>

        <div class="story-box" id="storyText">
            Pot masih bersih dan kosong. Elaina bersiap meracik ramuan keabadian. Apa yang harus ia lakukan pertama kali?
        </div>

        <div class="actions" id="actionButtons">
            <button class="action-btn" onclick="lakukanAksi('tambah')">Tambah Ramuan</button>
            <button class="action-btn" onclick="lakukanAksi('besarkan')">Besarkan Api</button>
            <button class="action-btn" onclick="lakukanAksi('aduk')">Aduk</button>
            <button class="action-btn" onclick="lakukanAksi('mantra')">Mantra Penstabil</button>
            <button class="action-btn" onclick="lakukanAksi('kecilkan')">Kecilkan Api</button>
            <button class="btn-reset" onclick="resetGame()">Kembalikan Waktu</button>
        </div>
    </div>

    <script>
        // Data State Permainan
        const statesData = {
            "Kosong": {
                image: "kosong.png", 
                text: "Pot masih bersih dan kosong. Elaina bersiap meracik ramuan keabadian.",
                progress: "0%",
                color: "#e94560" 
            },
            "Tidak Mau Bereaksi": {
                image: "tbereaksi.png",
                text: "Bahan-bahan sudah dimasukkan, tetapi campuran diam saja karena suhu terlalu dingin.",
                progress: "20%",
                color: "#ed6954" 
            },
            "Bereaksi": {
                image: "bereaksi.png",
                text: "Api memanas! Bahan-bahan di dalam pot mulai melebur dan memancarkan cahaya.",
                progress: "40%",
                color: "#f28d48" 
            },
            "Tidak Stabil": {
                image: "tstabil.png",
                text: "PERINGATAN! Energi sihir bertabrakan, menciptakan percikan api dan getaran hebat!",
                progress: "60%",
                color: "#f6b13b" 
            },
            "Mendidih": {
                image: "apibesar.png",
                text: "Energi berhasil ditenangkan, namun suhunya mencapai titik kritis dan mulai berbuih hebat!",
                progress: "80%",
                color: "#fad52f" 
            },
            "Berhasil": {
                image: "berhasil(endstate).png",
                text: "Luar biasa! Cairan berubah menjadi emas bercahaya. Ramuan keabadian sukses dibuat!",
                progress: "100%",
                color: "#ffd700" 
            },
            "Gagal": {
                image: "gagal.png",
                text: "BAMMM!! Kesalahan fatal! Pot meledak berkeping-keping. Usaha gagal!",
                progress: "100%",
                color: "#ff3333" 
            }
        };

        // Logika Transisi DFA
        const transisiDFA = {
            "Kosong": { "tambah": "Tidak Mau Bereaksi" },
            "Tidak Mau Bereaksi": { "besarkan": "Bereaksi" },
            "Bereaksi": { "aduk": "Tidak Stabil" },
            "Tidak Stabil": { 
                "mantra": "Mendidih",
                "besarkan": "Gagal",
                "tambah": "Gagal"
            },
            "Mendidih": { 
                "kecilkan": "Berhasil",
                "aduk": "Gagal"
            }
        };

        let currentState = "Kosong";

        // Fungsi Utama untuk Menjalankan Aksi
        function lakukanAksi(aksi) {
            // Cek apakah game sudah selesai
            if (currentState === "Berhasil" || currentState === "Gagal") return;
            
            const validActions = transisiDFA[currentState];
            const loadingOverlay = document.getElementById("loadingOverlay");
            const stateImage = document.getElementById("stateImage");
            const actionButtons = document.querySelectorAll(".action-btn");

            // Jika aksi yang ditekan sesuai dengan DFA
            if (validActions && validActions[aksi]) {
                
                // 1. Tampilkan Loading Screen & Matikan Tombol
                loadingOverlay.style.display = "flex";
                stateImage.classList.add("img-blur");
                actionButtons.forEach(btn => btn.disabled = true);

                // 2. Beri jeda 2 detik untuk animasi loading
                setTimeout(() => {
                    // Pindah State
                    currentState = validActions[aksi];
                    updateUI(currentState, statesData[currentState]);

                    // 3. Sembunyikan Loading Screen
                    loadingOverlay.style.display = "none";
                    stateImage.classList.remove("img-blur");

                    // Aktifkan tombol lagi jika belum tamat
                    if (currentState !== "Berhasil" && currentState !== "Gagal") {
                        actionButtons.forEach(btn => btn.disabled = false);
                    }
                }, 500); 

            } else {
                // Jika langkah salah (memberikan peringatan teks kuning)
                const storyBox = document.getElementById("storyText");
                storyBox.innerText = "Elaina ragu... Sepertinya itu bukan langkah yang tepat saat ini. Coba langkah lain!";
                storyBox.style.color = "#ffdd57"; 
            }
        }

        // Fungsi untuk Memperbarui Tampilan UI
        function updateUI(stateName, stateInfo) {
            document.getElementById("stateLabel").innerText = "State: " + stateName;
            
            const storyBox = document.getElementById("storyText");
            storyBox.innerText = stateInfo.text;
            storyBox.style.color = "var(--text-light)"; 

            document.getElementById("stateImage").src = stateInfo.image;

            const bar = document.getElementById("progressBar");
            bar.style.width = stateInfo.progress;
            bar.style.backgroundColor = stateInfo.color;

            // Matikan tombol jika mencapai End State
            if (stateName === "Gagal" || stateName === "Berhasil") {
                const buttons = document.querySelectorAll(".action-btn");
                buttons.forEach(btn => btn.disabled = true);
            }
        }

        // Fungsi untuk Mengulang Permainan
        function resetGame() {
            currentState = "Kosong"; 
            
            // Nyalakan semua tombol aksi
            const buttons = document.querySelectorAll(".action-btn");
            buttons.forEach(btn => btn.disabled = false);
            
            // Pastikan overlay tertutup jika reset ditekan secara paksa
            document.getElementById("loadingOverlay").style.display = "none";
            document.getElementById("stateImage").classList.remove("img-blur");
            
            // Kembalikan UI ke awal
            updateUI(currentState, statesData[currentState]);
        }

        // Inisialisasi saat halaman dimuat
        window.onload = function() {
            updateUI("Kosong", statesData["Kosong"]);
        };
    </script>
</body>
</html>
